services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: veltrix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - veltrix_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    working_dir: /workspace/frontend
    volumes:
      - ../:/workspace
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000/api/v1/stream
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  veltrix_pgdata:
