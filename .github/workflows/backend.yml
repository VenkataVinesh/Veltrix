name: Backend CI

on:
  push:
    paths:
      - "backend/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python -m compileall app
      - run: docker build -t veltrix-backend-ci .
